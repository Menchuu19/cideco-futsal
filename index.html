<style>
  .torneo {
  font-size: 14px;
  color: #22c55e;
  letter-spacing: 2px;
  margin-bottom: 5px;

  .info-partido {
  margin-bottom: 10px;
  font-size: 14px;
  color: #94a3b8;
}

.info-partido p {
  margin: 2px;
}
.area {
  position: absolute;
  width: 120px;
  height: 60px;
  border: 2px solid rgba(255,255,255,0.3);
  left: 50%;
  transform: translateX(-50%);
  border-radius: 0 0 60px 60px;
}

.area-top {
  top: 0;
  border-top: none;
}

.area-bottom {
  bottom: 0;
  transform: translateX(-50%) rotate(180deg);
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
 background: url("img/fondo cideco.jpg") no-repeat center center fixed;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(8px);
  background: rgba(0, 0, 0, 0.6);
  z-index: -1;
}
.container {
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

.cancha {
  position: relative;
  width: 300px;
  height: 500px;
  background: url("img/fondo-cideco.png") no-repeat center;
  background-size: cover;
  border-radius: 15px;
  overflow: hidden;
}
.foto {
  width: 100%;
  height: 100%;
  border-radius: 50%; /* 👈 lo hace círculo */
  object-fit: cover;  /* 👈 recorta bien la imagen */
  animation: aparecer 0.25s ease;
}

/* línea mitad */
.linea {
  position: absolute;
  top: 50%;
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.2);
}

/* círculo central */
.centro {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 80px;
  height: 80px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

/* jugador */
.jugador
 {
  position: absolute;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  overflow: visible; /* CLAVE */
}
.jugador {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: rgba(200, 200, 200, 0.15); /* gris transparente */
  border: 2px solid rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(4px); /* efecto vidrio (muy pro) */
  display: flex;
  align-items: center;
  justify-content: center;
  position: absolute;
  cursor: pointer;
  transition: 0.2s;
}

.jugador:hover {
  background: rgba(255, 255, 255, 0.18);
  transform: scale(1.12);
  border: 2px solid rgba(255,255,255,0.6);

  box-shadow:
    0 0 12px rgba(34,197,94,0.5),
    0 0 25px rgba(34,197,94,0.25);

  transition: all 0.2s ease;
}

.jugador .numero {
  color: rgba(255, 255, 255, 0.7);
  font-size: 26px;
  font-weight: bold;
}

/* EFECTO BOTÓN */
.jugador:active {
  transform: scale(0.95);
}

.jugador:hover {
  box-shadow: 0 0 10px rgba(34,197,94,0.5);
}
.jugador.activo {
  border: 2px solid #22c55e;
  box-shadow: 0 0 12px rgba(34,197,94,0.7);
}
/* número */
.nombre {
  position: absolute;
  top: 100%; /* lo deja abajo del círculo */
  left: 50%;
  transform: translateX(-50%);
  
  background: rgba(0, 0, 0, 0.6);
  padding: 3px 8px;
  border-radius: 8px;

  color: white;
  font-size: 12px;
  font-weight: bold;

  white-space: nowrap;
}

/* buscador */
.buscador {
  margin-top: 15px;
}


input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 200px;
}

.resultados {
  background: #111827;
  margin-top: 5px;
  border-radius: 8px;
  max-height: 120px;
  overflow-y: auto;
}

.item {
  padding: 8px;
  cursor: pointer;
}

.item:hover {
  background: #1f2937;
}

.btn-guardar{
  margin-top: 10px;
  padding: 10px 20px;
  background: #00ff88;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}
  .btn-guardar:disabled {
  opacity: 0.9;
  transform: scale(0.98);
}
  .reset-btn{
  background: #334155;
  color: white;
  margin-left: 10px;
}

.reset-btn:hover{
  background: #475569;
}
  @media (max-width: 600px) {
  body {
    align-items: flex-start;
    height: auto;
    min-height: 100vh;
  }

  .container {
    padding: 15px 10px;
  }

  h1 {
    font-size: 22px;
  }

  .cancha {

  input {

  }

  .btn-guardar {
    margin-top: 10px;
    width: 230px;
  }

  .reset-btn {
    margin-left: 0;
    display: block;
    margin: 10px auto 0;
  }

  .mensaje-confirmado{
  display: none;
  margin-bottom: 15px;
  background: rgba(34,197,94,0.2);
  border: 1px solid #22c55e;
  color: #22c55e;
  padding: 10px;
  border-radius: 10px;
  font-weight: bold;
}
  @keyframes aparecer {
  from {
    transform: scale(0.7);
    opacity: 0;
  }

  to {
    transform: scale(1);
    opacity: 1;
  }
}

function reiniciarEquipo(){

  const jugadores = document.querySelectorAll(".jugador");

    j.innerHTML = `<div class="numero">+</div>`;

  });

function selectPos(el){
  document.querySelectorAll(".jugador").forEach(j => j.classList.remove("activo"));
  el.classList.add("activo");
  posicion = el;
  document.getElementById("input").focus();
}

function buscar(){
  const texto = document.getElementById("input").value.toLowerCase();

  const filtrados = jugadores.filter(j => 
    (j.nombre + " " + j.apellido).toLowerCase().includes(texto)
  );

  const resultados = document.getElementById("resultados");
  resultados.innerHTML = "";

  filtrados.forEach((j, index) => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = j.nombre + " " + j.apellido;

    if(index === seleccionIndex){
      div.style.background = "#1e293b";
    }

    div.onclick = () => elegirJugador(j);

    resultados.appendChild(div);
  });
}

function elegirJugador(j){
  if(posicion){
    posicion.innerHTML = `
      <img src="${j.img}" class="foto">
      <div class="nombre">${j.apellido}</div>
    `;
  }

  document.getElementById("input").value = "";
  document.getElementById("resultados").innerHTML = "";
}

function guardarEquipo(){

  const jugadores = document.querySelectorAll(".foto");

  if(jugadores.length < 5){
    alert("⚠️ Tenés que completar todo el equipo");
    return;
    document.getElementById("mensaje-confirmado").style.display = "block";
  }

  const boton = document.querySelector(".btn-guardar");

  boton.innerHTML = "✅ Equipo confirmado";
  boton.style.boxShadow = "0 0 15px rgba(34,197,94,0.6)";
  boton.disabled = true;

  boton.style.color = "white";
  boton.style.cursor = "default";
  document.querySelectorAll(".jugador").forEach(j => {
  j.style.pointerEvents = "none";
});
